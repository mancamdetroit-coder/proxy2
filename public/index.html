<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamshchos Proxy</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #fff; text-align: center; padding: 80px 20px; }
    h1 { font-size: 3rem; margin-bottom: 10px; }
    p { font-size: 1.2rem; color: #aaa; }
    form { max-width: 700px; margin: 40px auto; display: flex; gap: 10px; }
    input { flex: 1; padding: 18px; font-size: 1.1rem; border-radius: 12px; border: none; background: #222; color: white; }
    button { padding: 18px 40px; font-size: 1.1rem; background: #00ff9d; color: #000; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
    .quick { margin-top: 30px; }
    .quick button { margin: 8px; padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>🚀 Hamshchos Proxy</h1>
  <p>Unblock any website • Fast & Simple</p>

  <form action="/proxy" method="get">
    <input type="text" name="url" placeholder="https://youtube.com or just youtube.com" autocomplete="off" required>
    <button type="submit">Go →</button>
  </form>

  <div class="quick">
    <button onclick="window.location='/proxy/youtube.com'">YouTube</button>
    <button onclick="window.location='/proxy/instagram.com'">Instagram</button>
    <button onclick="window.location='/proxy/twitter.com'">X / Twitter</button>
    <button onclick="window.location='/proxy/tiktok.com'">TikTok</button>
    <button onclick="window.location='/proxy/reddit.com'">Reddit</button>
  </div>
</body>
</html>
